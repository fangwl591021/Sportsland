<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運動島綜合運動體能館</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        input, select, textarea { font-size: 16px; }
        [v-cloak] { display: none !important; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #06C755; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-primary { @apply bg-[#06C755] text-white font-bold py-3 rounded-lg shadow active:scale-95 transition disabled:bg-gray-300; }
        .btn-secondary { @apply border border-gray-300 text-gray-600 font-bold py-3 rounded-lg active:scale-95 transition; }
        .form-label { @apply block text-sm font-bold text-gray-700 mb-1; }
        .form-input { @apply w-full bg-gray-50 border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-[#06C755] outline-none; }
        .checkbox-wrapper { @apply flex items-center p-3 border rounded-lg bg-white mb-2 cursor-pointer transition; }
        .checkbox-wrapper.active { @apply border-[#06C755] bg-green-50; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">
    <div id="app" v-cloak class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative overflow-hidden">
        
        <!-- Header -->
        <header class="bg-[#06C755] text-white p-3 sticky top-0 z-30 flex items-center justify-between shadow-md">
            <h1 class="text-base font-black tracking-widest truncate pl-1">運動島報名系統</h1>
            <div class="flex items-center bg-white/20 px-2 py-1 rounded-full shrink-0 shadow-inner">
                <img v-if="userProfile?.pictureUrl" :src="userProfile.pictureUrl" class="w-6 h-6 rounded-full mr-2 border border-white/50">
                <span class="text-[11px] font-bold truncate max-w-[80px]">{{ userInfo?.name || '載入中' }}</span>
            </div>
        </header>

        <main class="flex-grow pb-24 overflow-y-auto">
            <!-- 課程列表首頁 -->
            <div v-if="view === 'course_list'" class="fade-in">
                <img src="https://aiwe.cc/wp-content/uploads/2026/02/17a931ba9905835dd08db446b3d33e1b.png" class="w-full">
                
                <div class="grid grid-cols-3 gap-2 px-3 py-4 bg-white border-b shadow-sm sticky top-0 z-20">
                    <button @click="editProfile" class="flex flex-col items-center justify-center py-2 bg-green-50 text-[#06C755] rounded-xl border border-green-100">
                        <i class="fas fa-user-edit text-xl mb-1"></i><span class="text-[10px] font-bold">基本資料</span>
                    </button>
                    <button @click="goToMyOrders" class="flex flex-col items-center justify-center py-2 bg-blue-50 text-blue-600 rounded-xl border border-blue-100">
                        <i class="fas fa-history text-xl mb-1"></i><span class="text-[10px] font-bold">報名紀錄</span>
                    </button>
                    <a href="https://lin.ee/Y0FKXqD" target="_blank" class="flex flex-col items-center justify-center py-2 bg-indigo-50 text-indigo-600 rounded-xl border border-indigo-100">
                        <i class="fab fa-line text-xl mb-1"></i><span class="text-[10px] font-bold">客服小幫手</span>
                    </a>
                </div>

                <div class="p-4 space-y-4">
                    <h2 class="text-lg font-black border-l-4 border-[#06C755] pl-2">當期活動報名</h2>
                    <div v-if="isCoursesLoading" class="text-center py-10"><div class="loader mx-auto"></div></div>
                    <div v-else v-for="cat in categories" :key="cat.id" class="border rounded-2xl overflow-hidden shadow-sm bg-white mb-4">
                        <button @click="toggleCategory(cat.id)" class="w-full px-5 py-4 flex justify-between items-center">
                            <span class="font-bold"><i :class="[cat.icon, cat.color]" class="mr-2"></i>{{ cat.name }}</span>
                            <i class="fas fa-chevron-down text-gray-300 transition" :class="{'rotate-180': expandedCategory===cat.id}"></i>
                        </button>
                        <div v-if="expandedCategory === cat.id" class="p-3 bg-gray-50 space-y-3">
                            <div v-for="c in filteredCourses" :key="c.id" class="bg-white border rounded-xl p-4 shadow-sm">
                                <div class="flex justify-between mb-2">
                                    <h3 class="font-bold text-gray-800 leading-tight">{{ c.name }}</h3>
                                    <span class="text-[#06C755] font-black">${{ c.price }}</span>
                                </div>
                                <div class="text-xs text-gray-400 mb-4">日期：{{ c.startDate }} ~ {{ c.endDate }}</div>
                                <div class="flex gap-2">
                                    <button @click="openDetail(c)" class="flex-1 py-2 bg-gray-100 text-gray-600 rounded-lg text-xs font-bold">查看詳情</button>
                                    <button @click="selectCourse(c)" :disabled="c.enrolled >= c.capacity" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-xs font-bold shadow-sm">
                                        {{ c.enrolled >= c.capacity ? '名額已滿' : '立即報名' }}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 我的報名紀錄 -->
            <div v-else-if="view === 'my_orders'" class="p-4 fade-in">
                <div class="flex items-center mb-6">
                    <button @click="view='course_list'" class="w-8 h-8 bg-gray-100 rounded-full mr-3 flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
                    <h2 class="text-xl font-bold">報名紀錄查詢</h2>
                </div>
                <div v-for="o in myOrders" :key="o.orderId" class="bg-white border rounded-2xl p-4 mb-4 shadow-sm relative overflow-hidden">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-green-500" :class="getStatusBorderClass(o.status)"></div>
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-sm text-gray-800">{{ o.courseName }}</h4>
                        <span :class="getStatusBadgeClass(o.status)" class="text-[10px] px-2 py-1 rounded font-bold">{{ getStatusLabel(o.status) }}</span>
                    </div>
                    <div class="text-xs text-gray-400 mb-3">{{ o.name }} | 金額 ${{ o.amount }}</div>
                    <div class="flex gap-2">
                        <!-- 待付款且未回填五碼 -->
                        <button v-if="o.status === 'PENDING' && !o.remittance" @click="openOrderDetail(o)" class="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-xs font-bold shadow-sm">回填五碼並修改</button>
                        <!-- 其他有效狀態 (除取消/退款外) 顯示詳細資訊與退費申請 -->
                        <button v-else-if="!['CANCELLED','REFUNDED','REFUND_REQUESTED'].includes(o.status)" @click="openOrderInfo(o)" class="flex-1 py-2.5 bg-gray-50 text-gray-600 border border-gray-200 rounded-lg text-xs font-bold">報名詳情 / 申請退款</button>
                    </div>
                </div>
                <div v-if="myOrders.length === 0" class="text-center py-20 text-gray-400 italic">目前尚無任何報名紀錄</div>
            </div>

            <!-- 報名確認頁與詳細內容... (其餘模組依此邏輯類推) -->
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const API_ENDPOINT = 'https://sport-island.fangwl591021.workers.dev/';
        const LIFF_ID = '2008786875-7COWtgtL';

        createApp({
            setup() {
                const view = ref('course_list'), userProfile = ref(null), userInfo = ref({}), courses = ref([]), myOrders = ref([]);
                const isCoursesLoading = ref(true), isAuthLoading = ref(true), expandedCategory = ref('');
                const categories = [
                    { id: '單日課程', name: '單日活動', icon: 'fas fa-calendar-day', color: 'text-pink-500' },
                    { id: '常態課後', name: '常態課後', icon: 'fas fa-school', color: 'text-blue-500' },
                    { id: '多日營隊', name: '營隊課程', icon: 'fas fa-campground', color: 'text-green-500' }
                ];

                const init = async () => {
                    try {
                        await liff.init({ liffId: LIFF_ID });
                        if (!liff.isLoggedIn()) { liff.login(); return; }
                        userProfile.value = await liff.getProfile();
                        const data = await callApi('CHECK_USER');
                        if (data.registered) { userInfo.value = data.info; loadCourses(); } else { view.value = 'register'; }
                        isAuthLoading.value = false;
                    } catch (e) { alert('系統初始化失敗'); }
                };

                const callApi = async (action, payload = {}) => {
                    const res = await fetch(API_ENDPOINT, { method: 'POST', body: JSON.stringify({ action, userProfile: { userId: userProfile.value?.userId }, payload }) });
                    const json = await res.json();
                    if (json.status !== 'success') throw new Error(json.message);
                    return json.data;
                };

                const loadCourses = async () => { 
                    isCoursesLoading.value = true; 
                    courses.value = await callApi('GET_COURSES'); 
                    isCoursesLoading.value = false; 
                };

                const goToMyOrders = async () => {
                    view.value = 'my_orders';
                    myOrders.value = await callApi('GET_USER_ORDERS');
                };

                const getStatusLabel = s => ({ 'PENDING': '尚未繳費', 'PAID': '已完成繳費', 'REFUND_REQUESTED': '退款申請中', 'REFUNDED': '已退款', 'CANCELLED': '已取消' }[s] || s);
                const getStatusBadgeClass = s => ({ 'PENDING': 'bg-yellow-100 text-yellow-800', 'PAID': 'bg-green-100 text-green-800', 'REFUND_REQUESTED': 'bg-orange-100 text-orange-700', 'REFUNDED': 'bg-red-100 text-red-800', 'CANCELLED': 'bg-gray-100 text-gray-500' }[s]);
                const getStatusBorderClass = s => ({ 'PENDING': 'bg-yellow-400', 'PAID': 'bg-green-500', 'REFUND_REQUESTED': 'bg-orange-500', 'REFUNDED': 'bg-red-500', 'CANCELLED': 'bg-gray-300' }[s]);

                onMounted(init);
                return { view, userProfile, userInfo, courses, isCoursesLoading, categories, expandedCategory, myOrders,
                    toggleCategory: id => expandedCategory.value = expandedCategory.value === id ? '' : id,
                    filteredCourses: computed(() => courses.value.filter(c => c.type === expandedCategory.value)),
                    goToMyOrders, getStatusLabel, getStatusBadgeClass, getStatusBorderClass
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
